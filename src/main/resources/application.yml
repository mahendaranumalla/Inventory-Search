spring:
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_system?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update   # create, create-drop, validate, none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  mvc:
    contentnegotiation:
      favor-path-extension: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /docs/openapi.yml

